name: assignment2
description: "Flutter Forums Application with Firebase & BLoC architecture."
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local firebase module
  firebase_service:
    path: packages/firebase_service

  # Firebase (needed for DefaultFirebaseOptions)
  firebase_core: ^3.0.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^8.0.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
